#nav{background:#0a0c10;border-bottom:1px solid #1e2838;position:sticky;top:0;z-index:100;display:flex;align-items:center;}
#tabBar{display:flex;overflow-x:auto;flex:1;}
.tab{background:transparent;color:#4a5a6a;border:none;border-bottom:2px solid transparent;padding:11px 13px;font-size:clamp(10px,1.3vw,12px);cursor:pointer;font-weight:normal;white-space:nowrap;flex-shrink:0;}
.tab.active{background:#0d1117;color:#e8b832;border-bottom:2px solid #e8b832;font-weight:bold;}
.page{padding:14px 18px;display:none;max-width:1100px;}
.page.active{display:block;}
.card{background:#0d1117;border:1px solid #1e2838;border-radius:10px;padding:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.grid3{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.gridS{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{padding:6px 8px;text-align:left;color:#8b6914;font-size:9px;font-weight:700;white-space:nowrap;border-bottom:1px solid #8b6914;}
td{padding:5px 8px;border-bottom:1px solid #141820;vertical-align:middle;}
tr:nth-child(odd) td{background:#080b0f;}
tr:nth-child(even) td{background:#0a0d13;}
.inp{background:#080b0f;border:1px solid #1e2838;border-radius:5px;padding:6px 10px;color:#e8b832;font-size:11px;width:100%;}
.sel{background:#080b0f;border:1px solid #1e2838;border-radius:5px;padding:6px 8px;color:#e8b832;font-size:11px;width:100%;}
.btn-gold{background:linear-gradient(135deg,#e8b832,#c49a1a);color:#060810;border:none;border-radius:7px;padding:9px 18px;font-weight:900;font-size:12px;cursor:pointer;}
.pill{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:bold;}
.alert-buy{background:#022b10;border:1px solid #00c853;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.alert-sell{background:#2a0606;border:1px solid #d50000;border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.news-card{background:#0d1117;border-radius:10px;overflow:hidden;border:1px solid #1e2838;}
.bar-track{background:#141820;border-radius:20px;height:8px;overflow:hidden;margin:3px 0;}
.bar-fill{height:100%;border-radius:20px;}
.ctx-card{background:#0d1117;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live{animation:pulse 1.5s infinite;}
</style>

function lineChart(data,keys,colors,w,h){
  var pad={t:10,r:10,b:24,l:36};
  var allV=[];data.forEach(function(d){keys.forEach(function(k){allV.push(d[k]);});});
  var mn=Math.min.apply(null,allV),mx=Math.max.apply(null,allV),rng=mx-mn||1;
  function tx(i){return pad.l+i*(w-pad.l-pad.r)/(data.length-1);}
  function ty(v){return pad.t+(mx-v)/rng*(h-pad.t-pad.b);}
  var s='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;overflow:visible">';
  keys.forEach(function(k,ki){
    var pts=data.map(function(d,i){return tx(i).toFixed(1)+","+ty(d[k]).toFixed(1);}).join(" ");
    s+='<polyline points="'+pts+'" fill="none" stroke="'+colors[ki]+'" stroke-width="'+(ki===0?2.5:1.5)+'"/>';
    // Dots on last point
    var last=data[data.length-1];
    s+='<circle cx="'+tx(data.length-1).toFixed(1)+'" cy="'+ty(last[k]).toFixed(1)+'" r="3" fill="'+colors[ki]+'"/>';
  });
  data.forEach(function(d,i){s+='<text x="'+tx(i).toFixed(1)+'" y="'+(h-4)+'" text-anchor="middle" fill="#5a6a7a" font-size="9">'+d.yr+'</text>';});
  [mn,Math.round(mn+rng/2),mx].forEach(function(v){s+='<text x="'+(pad.l-4)+'" y="'+(ty(v)+4).toFixed(1)+'" text-anchor="end" fill="#5a6a7a" font-size="8">'+Math.round(v)+'</text>';});
  s+='</svg>';
  return s;
}
function barChart(data,w,h){
  var pad={t:20,r:10,b:24,l:10};
  var mx=Math.max.apply(null,data.map(function(d){return d.r;}));
  var bw=(w-pad.l-pad.r)/data.length;
  var s='<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;overflow:visible">';
  data.forEach(function(d,i){
    var bh=Math.round(d.r/mx*(h-pad.t-pad.b));
    var x=pad.l+i*bw+bw*0.1,y=h-pad.b-bh;
    s+='<rect x="'+x+'" y="'+y+'" width="'+(bw*.8)+'" height="'+bh+'" fill="'+d.col+'" rx="2"/>';
    s+='<text x="'+(x+bw*.4)+'" y="'+(y-5)+'" text-anchor="middle" fill="'+d.col+'" font-size="9" font-weight="bold">'+d.r+'%</text>';
    s+='<text x="'+(x+bw*.4)+'" y="'+(h-4)+'" text-anchor="middle" fill="#5a6a7a" font-size="9">'+d.t+'</text>';
  });
  s+='</svg>';return s;
}
function horizontalBar(label,val,max,col,w){
  var pct=Math.round(val/max*100);
  return '<div style="margin-bottom:10px;">'+
    '<div style="display:flex;justify-content:space-between;margin-bottom:3px;font-size:10px;">'+
      '<span style="color:'+col+';font-weight:bold">'+esc(label)+'</span>'+
      '<span style="color:'+col+';font-weight:900">'+val+'</span>'+
    '</div>'+
    '<div class="bar-track" style="width:'+(w||"100%")+'"><div class="bar-fill" style="width:'+pct+'%;background:'+col+'"></div></div>'+
  '</div>';
}

function renderLaunch(){
  var cats=[];var catMap={};

  var done=Object.keys(launchDone).filter(function(k){return launchDone[k];}).length;
  var pct=Math.round(done/LAUNCH_STEPS.length*100);
  return '<h2 style="color:#e8b832;font-size:16px;margin:0 0 4px;font-family:Georgia,serif">🚀 Launch Checklist</h2>'+
  '<p style="color:#6a7a8a;font-size:12px;margin:0 0 14px">Complete these steps in order before your first subscriber pays you.</p>'+
  '<div class="card" style="margin-bottom:16px">'+

      '<span style="font-size:12px;color:#c0d0c0;font-weight:bold">'+done+'/'+LAUNCH_STEPS.length+' steps complete</span>'+
      '<span style="font-size:16px;font-weight:900;color:'+(pct===100?"#00e676":"#e8b832")+';font-family:Georgia,serif">'+pct+'%</span>'+
    '</div>'+
    '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(pct===100?"#00e676":"linear-gradient(90deg,#e8b832,#ffab40)")+'"></div></div>'+

  cats.map(function(cat){

    var catColors={Legal:"#ffd740",Money:"#00e676",Deploy:"#00c7b7",Content:"#ce93d8",Launch:"#e8b832"};
    var col=catColors[cat]||"#5a6a7a";

      '<p style="font-size:11px;font-weight:bold;color:'+col+';letter-spacing:.1em;margin:0 0 8px">'+cat.toUpperCase()+'</p>'+

          '<button onclick="toggleLaunch(&quot;'+step.key+'&quot;)" style="width:20px;height:20px;border-radius:4px;border:2px solid '+(isDone?'#00c853':'#3a4a5a')+';background:'+(isDone?'#00c853':'transparent')+';color:#060810;font-size:11px;cursor:pointer;flex-shrink:0;font-weight:bold;margin-top:1px">'+(isDone?"✓":"")+'</button>'+
          '<div style="flex:1">'+
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'+
              '<span style="font-size:12px;font-weight:bold;color:'+(isDone?'#69f0ae':'#c0d0c0')+'">'+(isDone?"<s>":"")+esc(step.label)+(isDone?"</s>":"")+'</span>'+
              (step.url!==";"?'<a href="'+esc(step.url)+'" target="_blank" style="font-size:9px;color:#40c4ff;background:#030d1c;border:1px solid #40c4ff44;border-radius:4px;padding:1px 7px;font-weight:bold">'+esc(step.url.replace("https://","").split("/")[0])+' &rarr;</a>':"")+

var PAGES = [renderHome,renderUpdate,renderTracker,renderAlerts,renderInvestor,renderCharts,renderContext,renderNews,renderPoliticians,renderActivity,renderLegal,renderGoLive,renderLaunch];

function renderNav(){
  document.getElementById("tabBar").innerHTML=TAB_KEYS.map(function(k,i){
    return '<button class="tab'+(currentTab===i?" active":"")+'" onclick="goTab('+i+')">'+tr(k)+'</button>';
  }).join("");
  document.getElementById("langBtn").innerHTML=(LANGS[lang]||"EN")+" &#x25BC;";
  document.getElementById("footer").innerHTML=tr("noAdvice");
  var menu=document.getElementById("langMenu");
  if(menu)menu.innerHTML=Object.keys(LANGS).map(function(k){
    return '<button onclick="setLang(&quot;'+k+'&quot;)" style="display:block;width:100%;background:'+(lang===k?"#1a1200":"transparent")+';color:'+(lang===k?"#e8b832":"#7a8a9a")+';border:none;border-bottom:1px solid #141820;padding:9px 14px;font-size:11px;cursor:pointer;text-align:left">'+LANGS[k]+'</button>';
  }).join("");
}

function renderPage(){
  var app=document.getElementById("app");
  if(!app)return;
  try{app.innerHTML=PAGES[currentTab]();}catch(e){app.innerHTML='<div style="padding:20px;color:#ff5252">Error: '+e.message+'</div>';}
}

function render(){renderNav();renderPage();}
function goTab(n){currentTab=n;saveMisc();render();}
function setTab(n){goTab(n);}

// =====================================================================
// EVENT HANDLERS
// =====================================================================
function toggleLangMenu(){var m=document.getElementById("langMenu");if(m)m.style.display=m.style.display==="none"?"block":"none";}
function setLang(l){lang=l;var m=document.getElementById("langMenu");if(m)m.style.display="none";render();}
function setFilter(f){filter=f;render();}
function setSearch(v){search=v;renderPage();}
function setInvView(v){investorView=v;render();}
function setCtxFilter(v){ctxFilter=v;render();}
function toggleForm(){showForm=!showForm;editId=null;formData=Object.assign({},blank);render();}
function fv(k,v){formData[k]=v;}
function startEdit(id){var s=stocks.find(function(x){return x.id===id;});if(!s)return;formData=Object.assign({},s);editId=id;showForm=true;render();}
function delStock(id){if(!confirm("Delete this entry?"))return;stocks=stocks.filter(function(x){return x.id!==id;});saveStocks();render();}
function dismiss(id){dismissed.push(id);saveMisc();render();}
function restoreAll(){dismissed=[];saveMisc();render();}
function toggleWatch(id){watchlist[id]=!watchlist[id];saveMisc();render();}
function chgAlloc(t,d){alloc[t]=Math.max(0,Math.min(50,(alloc[t]||0)+d));saveMisc();render();}
function saveLink(){linkSaved=true;saveMisc();render();}
function toggleLaunch(k){launchDone[k]=!launchDone[k];saveMisc();render();}
function saveForm(){
  if(!formData.ticker)return;
  var entry=Object.assign({},formData);
  if(editId!=null){stocks=stocks.map(function(s){return s.id===editId?Object.assign({},s,entry):s;});}
  else{entry.id=Date.now();stocks.push(entry);}
  saveStocks();showForm=false;editId=null;formData=Object.assign({},blank);render();
}
function applyManual(){
  var tk=(document.getElementById("mTicker")||{}).value;if(!tk)return;
  tk=tk.toUpperCase();
  var pol=(document.getElementById("mPol")||{}).value||"Manual Entry";
  var ret=(document.getElementById("mRet")||{}).value;
  var stake=(document.getElementById("mStake")||{}).value;
  var note=(document.getElementById("mNote")||{}).value;
  var sig=(document.getElementById("mSig")||{}).value||"BUY";
  var found=false;
  stocks=stocks.map(function(s){
    if(s.ticker===tk&&s.pol.toLowerCase()===pol.toLowerCase()){
      found=true;return Object.assign({},s,{sig:sig,ret:ret,stake:stake,note:note});
    }return s;
  });
  if(!found)stocks.push({id:Date.now(),pol:pol,pty:"B",ticker:tk,co:"",sig:sig,sta:"UNKNOWN",ret:ret,type:"Purchase",date:TODAY,stake:stake,wk:"Watch",note:note});
  saveStocks();render();
}
function runUpdate(){
  var btn=document.getElementById("runBtn");
  if(btn){btn.textContent="⏳ Updating...";btn.disabled=true;btn.style.opacity=".6";}
  setTimeout(function(){
    if(btn){btn.textContent="▶ Run Update";btn.disabled=false;btn.style.opacity="1";}
    alert("Update complete — "+stocks.length+" positions tracked as of "+TODAY);
  },1800);
}
document.addEventListener("click",function(e){
  var menu=document.getElementById("langMenu");
  if(menu&&!menu.contains(e.target)&&e.target.id!=="langBtn")menu.style.display="none";
});

// INIT
render();
</script>
